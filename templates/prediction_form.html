<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Inter',sans-serif; background:#f4f7fb; }
        .container { max-width:900px; margin:40px auto; background:white; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align:center; margin-bottom:30px; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
        select,input { padding:10px; border-radius:8px; border:1px solid #ddd; width:100%; }
        label { font-size:14px; font-weight:500; }
        .btn { margin-top:30px; width:100%; padding:14px; border:none; border-radius:10px; font-size:16px; background:linear-gradient(90deg,#36d1dc,#5b86e5); color:white; cursor:pointer; }
        .btn:hover { opacity:0.9; }
        .result { margin-top:30px; padding:20px; border-radius:10px; display:none; }
        .high { background:#ffcccc; }
        .medium { background:#fff4cc; }
        .low { background:#ccffdd; }
        .back { margin-bottom:20px; cursor:pointer; color:#5b86e5; }
    </style>
</head>
<body>
<div class="container">

    <div class="back" onclick="window.location.href='/'">← Back to Home</div>

    <h2>🔍 Disease Risk Prediction</h2>

    <!-- Patient Info -->
    <label>Patient Name</label>
    <input type="text" id="name" required>

    <label>Gender</label>
    <select id="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <!-- Disease Selection -->
    <label>Select Disease</label>
    <select id="disease"></select>

    <!-- Dynamic Input Fields -->
    <div id="inputFields" class="form-grid"></div>

    <!-- Submit -->
    <button class="btn" onclick="submitData()">Predict Risk</button>

    <!-- Result -->
    <div id="resultBox" class="result"></div>
</div>

<script>
const diseaseSelect = document.getElementById("disease");

// Backend expects these exact keys for each disease
const diseaseOptions = {
    diabetes:["Pregnancies","Glucose","BloodPressure","SkinThickness","Insulin","BMI","DiabetesPedigreeFunction","Age"],
    heart:["age","sex","cp","trestbps","chol","fbs","restecg","thalach","exang","oldpeak","slope","ca","thal"],
    pcos:["Age","BMI","Menstrual_Irregularity","Testosterone_Level","Antral_Follicle_Count"]
};

// Populate disease select
for(let key in diseaseOptions){
    let option=document.createElement("option");
    option.value=key;
    option.textContent=key.toUpperCase();
    diseaseSelect.appendChild(option);
}

// Create dynamic inputs
function createInputs(fields){
    let html="";
    fields.forEach(field=>{
        html+=`<div><label>${field}</label><input type="number" id="${field}" required></div>`;
    });
    document.getElementById("inputFields").innerHTML=html;
}

// Initial inputs for default disease
createInputs(diseaseOptions["diabetes"]);

diseaseSelect.addEventListener("change",function(){ createInputs(diseaseOptions[this.value]); });

// Submit function
function submitData(){
    const name = document.getElementById("name").value.trim();
    const gender = document.getElementById("gender").value;
    const disease = diseaseSelect.value;

    if(!name){
        alert("Please enter patient name");
        return;
    }

    const inputs = document.querySelectorAll("#inputFields input");
    let data = {};
    let emptyField=false;
    inputs.forEach(input=>{
        const val=parseFloat(input.value);
        if(isNaN(val)){
            emptyField=true;
        }
        data[input.id]=val;
    });
    if(emptyField){
        alert("Please fill all fields correctly");
        return;
    }

    fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({disease:disease,data:data,name:name,gender:gender})
    })
    .then(res=>res.json())
    .then(response=>{
        console.log(response);
        if(response.error){
            alert("Error: "+response.error);
            return;
        }
        const box=document.getElementById("resultBox");
        box.style.display="block";
        const riskClass=response.risk_level.toLowerCase();
        box.className="result "+riskClass;
        box.innerHTML=`<h3>Prediction: ${response.prediction}</h3>
        <p><strong>Risk Probability:</strong> ${(response.risk_probability*100).toFixed(2)}%</p>
        <p><strong>Risk Level:</strong> ${response.risk_level}</p>
        <p><strong>Suggestion:</strong> ${response.suggestion}</p>`;
    })
    .catch(err=>{
        console.error(err);
        alert("Request failed. Make sure the backend is running.");
    });
}
</script>
</body>
</html>
