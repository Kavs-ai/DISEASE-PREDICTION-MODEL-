<!DOCTYPE html>
<html>
<head>
    <title>AI Disease Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            max-width: 850px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            color: white;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
        }

        .active {
            background: #ff5e62;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 100%;
            margin: 8px 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff5e62;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .high { background:red; }
        .medium { background:orange; }
        .low { background:green; }
    </style>
</head>

<body>

<div class="container">

    <h2>AI Disease Predictor</h2>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab" onclick="selectDisease('diabetes', this)">Diabetes</div>
        <div class="tab" onclick="selectDisease('heart', this)">Heart</div>
        <div class="tab" onclick="selectDisease('pcos', this)">PCOS</div>
    </div>

    <input id="name" placeholder="Patient Name">

    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <div id="inputFields" class="form-grid"></div>

    <button class="btn" onclick="submitData()">Predict</button>

    <div id="resultBox" class="result"></div>

</div>

<script>

const diseaseOptions = {
    diabetes:["Pregnancies","Glucose","BloodPressure","SkinThickness","Insulin","BMI","DiabetesPedigreeFunction","Age"],
    heart:["age","sex","cp","trestbps","chol","fbs","restecg","thalach","exang","oldpeak","slope","ca","thal"],
    pcos:["Age","BMI","Menstrual_Irregularity","Testosterone_Level","Antral_Follicle_Count"]
};

let selectedDisease = "";

function selectDisease(disease, element){

    selectedDisease = disease;

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    element.classList.add("active");

    createInputs(diseaseOptions[disease]);

    const gender = document.getElementById("gender");

    if(disease === "pcos"){
        gender.value = "Female";
        gender.style.display = "none";
    } else {
        gender.style.display = "block";
    }
}

function createInputs(fields){
    let html = "";
    fields.forEach(field=>{
        html += `<input type="number" placeholder="${field}" id="${field}">`;
    });
    document.getElementById("inputFields").innerHTML = html;
}

function submitData(){

    if(!selectedDisease){
        alert("Select disease first");
        return;
    }

    const name = document.getElementById("name").value.trim();
    if(!name){
        alert("Enter name");
        return;
    }

    let gender = document.getElementById("gender").value;
    if(selectedDisease === "pcos") gender = "Female";

    let data = {};
    let missing = [];

    document.querySelectorAll("#inputFields input").forEach(input=>{
        if(input.value === ""){
            missing.push(input.id);
        } else {
            data[input.id] = parseFloat(input.value);
        }
    });

    if(missing.length){
        alert("Fill all fields: " + missing.join(", "));
        return;
    }

    const box = document.getElementById("resultBox");
    box.style.display = "block";
    box.innerHTML = "Predicting...";

    fetch("/predict",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:name,
            gender:gender,
            disease:selectedDisease,
            data:data
        })
    })
    .then(res=>res.json())
    .then(res=>{
        if(res.error){
            box.innerHTML = res.error;
            return;
        }

        box.className = "result " + res.risk_level.toLowerCase();

        box.innerHTML = `
        <h3>${res.prediction}</h3>
        <p>Probability: ${res.risk_probability}</p>
        <p>Risk: ${res.risk_level}</p>
        <p>${res.suggestion}</p>`;
    });
}

</script>

</body>
</html>
